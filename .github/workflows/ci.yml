name: CI

on:
  push:
    branches: [main]
  pull_request:

# Lightweight checks for a zero-build, zero-dependency static app: syntax + i18n parity + fee-model
# self-check. No `npm install` — the scripts use only Node built-ins. CodeQL runs separately (default setup).

# Least privilege for GITHUB_TOKEN: these checks only read the repo (checkout + node), nothing writes.
permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read   # gitleaks lists the PR commits (else 403 on pull_request events)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0     # gitleaks scans the full history, not just the tip
      # The pre-commit hook is bypassable (--no-verify) and only exists on machines that
      # installed it. This is the enforced backstop. False positives go in .gitleaksignore.
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Syntax check
        run: |
          node --check web/assets/app.js
          node --check web/assets/wallet.js
      - name: i18n fr/en parity
        run: node scripts/check-i18n.mjs
      - name: Fee-model self-check
        run: node scripts/test-model.mjs
