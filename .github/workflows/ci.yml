# Installed as .github/workflows/ci.yml by `init-project.sh --type static`. Job name MUST stay
# `checks` (the ruleset requires it).
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GITLEAKS_VERSION: v8.30.1
      GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
      ACTIONLINT_VERSION: v1.7.12
      ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
      OSV_VERSION: v2.4.0
      OSV_SHA256: 15314940c10d26af9c6649f150b8a47c1262e8fc7e17b1d1029b0e479e8ed8a0
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 0
      # The pre-commit hook can be bypassed with --no-verify, and only exists on machines
      # that installed it. This is the enforced backstop.
      - name: Install gitleaks (pinned + checksum-verified)
        run: |
          set -euo pipefail
          v="${GITLEAKS_VERSION#v}"   # the tag carries the `v`, the asset name does not
          f="gitleaks_${v}_linux_x64.tar.gz"
          curl -sSfL -o "$f" \
            "https://github.com/gitleaks/gitleaks/releases/download/${GITLEAKS_VERSION}/${f}"
          echo "${GITLEAKS_SHA256}  ${f}" | sha256sum -c -
          tar -xzf "$f" gitleaks
      - name: Secret scan (full history)
        run: ./gitleaks git --no-banner --redact
      - name: Lint workflows (actionlint, pinned + checksum-verified)
        run: |
          set -euo pipefail
          v="${ACTIONLINT_VERSION#v}"
          f="actionlint_${v}_linux_amd64.tar.gz"
          curl -sSfL -o "$f" \
            "https://github.com/rhysd/actionlint/releases/download/${ACTIONLINT_VERSION}/${f}"
          echo "${ACTIONLINT_SHA256}  ${f}" | sha256sum -c -
          tar -xzf "$f" actionlint
          ./actionlint -color
      # Semgrep + osv-scanner — why BOTH, and what each one ACTUALLY does.
      #
      # semgrep = the ONLY static analysis of the CODE that runs while PRIVATE. CodeQL is barred
      #   there by LICENCE (not by a technical limit), and a repository spends its whole youth
      #   private: without semgrep the code is NEVER analysed until the flip, where CodeQL then
      #   dumps the entire backlog at once.
      #   ⚠ Do NOT write "semgrep catches what CodeQL misses". That is the comfortable line, and
      #     NOTHING backs it. Semgrep CE is intra-file AND intra-function — inter-procedural
      #     dataflow lives in the paid Pro edition — where CodeQL does cross-file dataflow. semgrep
      #     PRECEDES CodeQL, it does not surpass it. It is kept for the PRIVATE PHASE: that reason
      #     is sufficient on its own, and a false one added on top helps nobody.
      #
      # osv-scanner = the pre-merge dependency GATE.
      #   ⚠ Do NOT write "nothing else sees vulnerabilities while private": Dependabot ALERTS does
      #     work on a private repository, for free. But it alerts AFTER THE FACT, on the default
      #     branch — once the code is ALREADY in. osv-scanner BLOCKS THE PULL REQUEST. A different
      #     role, not a duplicate. (`dependency-review` is the NATIVE gate — but it requires a
      #     public repository, or GHAS.)
      #   There is NO `npm audit` alongside it: that was a STRICT SUBSET of osv-scanner (same GHSA
      #   database, same lockfile, same job).
      #
      # --exclude=.github: the workflows have their own linters (actionlint + zizmor), which enforce
      #   THIS REPOSITORY'S PINNING POLICY (SHA for third-party actions, a major tag tolerated for
      #   actions/* and github/* — compromising those means compromising GitHub itself). semgrep's
      #   workflow rules CONTRADICT that policy and would fail every scaffold on day one.
      #   ⚠ Do NOT write "one scope each, no overlap": that has been FALSE since April 2025. CodeQL
      #     now analyses the `actions` language (GA, and ACTIVE IN DEFAULT SETUP, no opt-in): its
      #     default suite already covers most of what zizmor does — code-injection, artifact/cache
      #     poisoning, untrusted-checkout, exposed secrets, missing-workflow-permissions. THE
      #     OVERLAP IS REAL. What zizmor keeps ON ITS OWN, and what justifies keeping it: this
      #     repository's pinning policy (`zizmor.yml`) — the CodeQL `unpinned-tag` query sits in
      #     security-extended, NOT in default — plus artipacked (persist-credentials),
      #     impostor-commit, ref-confusion, typosquat-uses.
      - name: Static analysis (semgrep, pinned)
        run: |
          set -euo pipefail
          python3 -m pip install --quiet -r requirements-ci.txt
          semgrep scan --error --quiet --metrics=off --exclude=.github \
            --config p/security-audit --config p/owasp-top-ten .
      # osv-scanner AUTO-DISCOVERS every lockfile/manifest in the repo (`-r .`): npm, pip, go, cargo…
      # — the scope follows the code, never a hand-kept list. The one carve-out is likewise NOT a
      # per-target list: CI-only tooling (requirements-ci.txt) is subtracted in .gitignore, which osv
      # honours (dev tools, never shipped — see that file). `--allow-no-lockfiles` exits 0 when a
      # repo has none (a pure static site) instead of erroring. No `hashFiles` guard: the step always
      # runs and always reports (a required check that never reports leaves every PR stuck on
      # "Expected — waiting for status").
      - name: Vulnerable dependencies (osv-scanner, pinned + checksum-verified)
        run: |
          set -euo pipefail
          curl -sSfL -o osv-scanner \
            "https://github.com/google/osv-scanner/releases/download/${OSV_VERSION}/osv-scanner_linux_amd64"
          echo "${OSV_SHA256}  osv-scanner" | sha256sum -c -
          chmod +x osv-scanner
          ./osv-scanner scan source -r . --allow-no-lockfiles
      - name: Audit workflows (zizmor)
        run: |
          set -euo pipefail
          python3 -m pip install --quiet -r requirements-ci.txt
          zizmor --persona regular --config .github/zizmor.yml .github/workflows/
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
      # Real check with no per-project wiring: syntax-check every JS file.
      - name: Syntax check (all JS)
        run: find . -name '*.js' -not -path './node_modules/*' -not -path './.git/*' -exec node --check {} +
      - name: i18n fr/en parity
        run: node scripts/check-i18n.mjs
      - name: Fee-model self-check
        run: node scripts/test-model.mjs
