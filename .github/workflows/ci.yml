# Installed as .github/workflows/ci.yml by `init-project.sh --type static`. Job name MUST stay
# `checks` (the ruleset requires it).
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GITLEAKS_VERSION: v8.30.1
      GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
      ACTIONLINT_VERSION: v1.7.12
      ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
      OSV_VERSION: v2.4.0
      OSV_SHA256: 15314940c10d26af9c6649f150b8a47c1262e8fc7e17b1d1029b0e479e8ed8a0
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 0
      # The pre-commit hook can be bypassed with --no-verify, and only exists on machines
      # that installed it. This is the enforced backstop.
      - name: Install gitleaks (pinned + checksum-verified)
        run: |
          set -euo pipefail
          v="${GITLEAKS_VERSION#v}"   # the tag carries the `v`, the asset name does not
          f="gitleaks_${v}_linux_x64.tar.gz"
          curl -sSfL -o "$f" \
            "https://github.com/gitleaks/gitleaks/releases/download/${GITLEAKS_VERSION}/${f}"
          echo "${GITLEAKS_SHA256}  ${f}" | sha256sum -c -
          tar -xzf "$f" gitleaks
      - name: Secret scan (full history)
        run: ./gitleaks git --no-banner --redact
      - name: Lint workflows (actionlint, pinned + checksum-verified)
        run: |
          set -euo pipefail
          v="${ACTIONLINT_VERSION#v}"
          f="actionlint_${v}_linux_amd64.tar.gz"
          curl -sSfL -o "$f" \
            "https://github.com/rhysd/actionlint/releases/download/${ACTIONLINT_VERSION}/${f}"
          echo "${ACTIONLINT_SHA256}  ${f}" | sha256sum -c -
          tar -xzf "$f" actionlint
          ./actionlint -color
      # Semgrep + osv-scanner — pourquoi les DEUX, et ce que chacun fait VRAIMENT.
      #
      # semgrep = la SEULE analyse statique du CODE qui tourne en PRIVÉ. CodeQL y est interdit par
      #   LICENCE (pas par une limite technique), et un repo passe toute sa jeunesse en privé : sans
      #   semgrep, le code n'est JAMAIS analysé jusqu'au flip, où CodeQL déverse tout l'arriéré.
      #   ⚠ NE PAS écrire « semgrep attrape ce que CodeQL rate ». C'est la phrase confortable, et elle
      #     n'est ÉTAYÉE PAR RIEN. Semgrep CE est intra-fichier ET intra-fonction — le dataflow
      #     inter-procédural est dans l'édition Pro, payante — là où CodeQL fait du dataflow
      #     cross-fichier. semgrep PRÉCÈDE CodeQL, il ne le dépasse pas. Il est gardé pour la PHASE
      #     PRIVÉE : cette raison suffit, et il n'en faut pas une fausse en plus.
      #
      # osv-scanner = le GATE pré-merge des dépendances.
      #   ⚠ NE PAS écrire « rien d'autre ne voit les vulnérabilités en privé » : Dependabot ALERTS
      #     fonctionne en privé, gratuitement. Mais il alerte APRÈS COUP, sur la branche par défaut —
      #     quand le code est DÉJÀ entré. osv-scanner, lui, BLOQUE LA PR. Rôle différent, pas doublon.
      #     (`dependency-review` est le gate NATIF — mais il exige un repo public, ou GHAS.)
      #   Il n'y a PAS de `npm audit` à côté : c'était un SOUS-ENSEMBLE STRICT d'osv-scanner (même base
      #   GHSA, même lockfile, même job).
      #
      # --exclude=.github : les workflows ont leurs propres linters (actionlint + zizmor), qui appliquent
      #   LA POLITIQUE DE PIN DE CE REPO (SHA pour les actions tierces, tag majeur toléré pour actions/*
      #   et github/* — les compromettre, c'est compromettre GitHub lui-même). Les règles workflow de
      #   semgrep CONTREDISENT cette politique et feraient échouer chaque scaffold dès le 1er jour.
      #   ⚠ NE PAS écrire « one scope each, no overlap » : c'est FAUX depuis avril 2025. CodeQL analyse
      #     désormais le langage `actions` (GA, et ACTIF EN DEFAULT SETUP, sans opt-in) : sa suite par
      #     défaut couvre déjà l'essentiel de zizmor — code-injection, artifact/cache-poisoning,
      #     untrusted-checkout, secrets exposés, missing-workflow-permissions. LE RECOUVREMENT EST RÉEL.
      #     Ce que zizmor garde EN PROPRE, et qui justifie de le garder : la politique de pin du repo
      #     (`zizmor.yml`) — la requête CodeQL `unpinned-tag` est en security-extended, PAS en default —
      #     plus artipacked (persist-credentials), impostor-commit, ref-confusion, typosquat-uses.
      - name: Static analysis (semgrep, pinned)
        run: |
          set -euo pipefail
          python3 -m pip install --quiet -r requirements-ci.txt
          semgrep scan --error --quiet --metrics=off --exclude=.github \
            --config p/security-audit --config p/owasp-top-ten .
      # A static site usually has no lockfile — the step then has nothing to scan and is skipped.
      # Guard on the STEP, never on the job: a required check that never reports leaves every PR
      # stuck forever on "Expected — waiting for status".
      - name: Vulnerable dependencies (osv-scanner, pinned + checksum-verified)
        if: hashFiles('package-lock.json') != ''
        run: |
          set -euo pipefail
          curl -sSfL -o osv-scanner \
            "https://github.com/google/osv-scanner/releases/download/${OSV_VERSION}/osv-scanner_linux_amd64"
          echo "${OSV_SHA256}  osv-scanner" | sha256sum -c -
          chmod +x osv-scanner
          ./osv-scanner scan source --lockfile=package-lock.json
      - name: Audit workflows (zizmor)
        run: |
          set -euo pipefail
          python3 -m pip install --quiet -r requirements-ci.txt
          zizmor --persona regular --config .github/zizmor.yml .github/workflows/
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
      # Real check with no per-project wiring: syntax-check every JS file.
      - name: Syntax check (all JS)
        run: find . -name '*.js' -not -path './node_modules/*' -not -path './.git/*' -exec node --check {} +
      - name: i18n fr/en parity
        run: node scripts/check-i18n.mjs
      - name: Fee-model self-check
        run: node scripts/test-model.mjs
